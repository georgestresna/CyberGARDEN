<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGARDEN Dashboard</title>
    <style>
        /* Clean, Minimalist, Light Theme */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            color: #111827;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .card {
            background: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e5e7eb;
            margin-bottom: 24px;
        }

        h2 {
            margin-top: 0;
            font-size: 16px;
            font-weight: 500;
            color: #6b7280;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Modern Button Styling for the Pulse Action */
        #pump-btn {
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            color: white;
            background-color: #3b82f6;
            /* Modern Blue */
        }

        #pump-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            background-color: #2563eb;
            /* Slightly darker blue on hover */
        }

        #pump-btn:disabled {
            background-color: #9ca3af !important;
            /* Gray out when watering */
            opacity: 0.8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #command-status {
            font-size: 13px;
            color: #6b7280;
            margin-top: 12px;
            text-align: center;
            min-height: 20px;
        }

        .raw-data {
            background: #f3f4f6;
            padding: 16px;
            border-radius: 8px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 13px;
            color: #374151;
            margin: 0;
            border: 1px solid #e5e7eb;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <h1>CyberGARDEN</h1>

    <div class="container">
        <div class="card">
            <h2>Hardware Controls</h2>
            <!-- Changed from toggle to a pulse trigger -->
            <button id="pump-btn" onclick="triggerWatering()">💧 Water Plant (5s)</button>
            <p id="command-status"></p>
        </div>

        <div class="card">
            <h2>Latest Sensor Reading</h2>
            <pre class="raw-data" id="latest-data-view">Waiting for data...</pre>
        </div>
    </div>

    <script>
        // Load the sensor data passed from FastAPI
        const database = {{ data | tojson | safe }};

        // Display the most recent data entry in the JSON viewer
        if (database && database.length > 0) {
            const latestEntry = database[database.length - 1];
            document.getElementById('latest-data-view').innerText = JSON.stringify(latestEntry, null, 2);
        }

        // The new 5-second Pulse Function
        async function triggerWatering() {
            const btn = document.getElementById('pump-btn');
            const statusText = document.getElementById('command-status');

            // 1. Instantly update the UI so the user can't spam the button
            btn.disabled = true;
            btn.innerText = "⏳ Watering... (5s)";
            statusText.innerText = "Sending command to AWS...";

            try {
                // 2. Call the new pulse endpoint
                const response = await fetch('/api/command/pulse', {
                    method: 'POST'
                    // We don't need a body anymore, the endpoint purely means "send 1"
                });

                const result = await response.json();

                if (result.status === "success") {
                    statusText.innerText = "✅ Command sent to garden.";
                } else {
                    statusText.innerText = "❌ Server error: " + result.message;
                }
            } catch (error) {
                console.error("Failed to send command:", error);
                statusText.innerText = "❌ Network error. Could not reach server.";
            }

            // 3. Start the 5-second UI countdown
            // Even if the network is slow, the button stays locked for 5 full seconds
            setTimeout(() => {
                btn.disabled = false;
                btn.innerText = "💧 Water Plant (5s)";

                // Clear the status text shortly after finishing
                setTimeout(() => { statusText.innerText = ""; }, 3000);
            }, 5000);
        }
    </script>
</body>

</html>
